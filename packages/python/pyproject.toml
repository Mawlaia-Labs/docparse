[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "mawlaia-docparse"
version = "0.1.0"
description = "LLM-powered document extraction SDK"
authors = ["Mawlaia <dev@mawlaia.com>"]
license = "MIT"
readme = "README.md"
homepage = "https://mawlaia.com"
repository = "https://github.com/mawlaia/docparse"
packages = [{ include = "docparse" }]

[tool.poetry.scripts]
docparse = "docparse.cli:main"

[tool.poetry.dependencies]
python   = "^3.10"
pydantic = "^2.0"
click    = "^8.0"

[tool.poetry.extras]
openai    = ["openai"]
anthropic = ["anthropic"]
pdf       = ["pdfplumber"]
all       = ["openai", "anthropic", "pdfplumber"]

[tool.poetry.dependencies.openai]
version  = "^1.0"
optional = true

[tool.poetry.dependencies.anthropic]
version  = "^0.25"
optional = true

[tool.poetry.dependencies.pdfplumber]
version  = "^0.11"
optional = true

[tool.poetry.group.dev.dependencies]
pytest         = "^8.0"
pytest-asyncio = "^0.23"
ruff           = "^0.4"
openai         = "^1.0"
pdfplumber     = "^0.11"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
